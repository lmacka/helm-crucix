apiVersion: v2
name: crucix
description: Self-hosted OSINT intelligence dashboard — 27 sources, real-time HUD
version: 0.2.0
appVersion: "2.0.0"
kubeVersion: ">=1.21.0-0"
type: application
maintainers:
  - name: lmacka
    url: https://github.com/lmacka
home: https://github.com/calesthio/Crucix
sources:
  - https://github.com/lmacka/Crucix
