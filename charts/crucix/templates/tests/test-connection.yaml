apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "crucix.fullname" . }}-test-connection"
  labels:
    {{- include "crucix.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
  containers:
    - name: wget
      image: busybox:stable
      command: ['sh', '-c', 'wget --spider --timeout=10 {{ include "crucix.fullname" . }}:{{ .Values.service.port }}']
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
  restartPolicy: Never
